# ══════════════════════════════════════════════════════════════════════════════
# PgBouncer — Connection Pool Config (Development / Docker Compose)
#
# pool_mode = transaction:
#   DB connection released after each transaction (not session).
#   Allows 400 app connections → only 25 real PostgreSQL connections.
#   Requires prepareThreshold=0 in JDBC URL (no server-side prepared stmts).
# ══════════════════════════════════════════════════════════════════════════════

[databases]
# "*" means all databases route here — Spring Boot still specifies dbname in URL
* = host=postgres port=5432

[pgbouncer]
# ── Network ───────────────────────────────────────────────────────────────────
listen_addr   = 0.0.0.0
listen_port   = 5432

# ── Auth ──────────────────────────────────────────────────────────────────────
# plain: safe for dev (Docker network only, never exposed to internet)
auth_type     = plain
auth_file     = /etc/pgbouncer/userlist.txt

# ── Pooling ───────────────────────────────────────────────────────────────────
pool_mode              = transaction
max_client_conn        = 1000    # max connections FROM the app
default_pool_size      = 25      # real PostgreSQL connections per database+user pair
min_pool_size          = 5       # keep at least 5 warm connections
reserve_pool_size      = 5       # extra connections for bursts
reserve_pool_timeout   = 3.0     # seconds to wait before using reserve pool

# ── Timeouts ──────────────────────────────────────────────────────────────────
server_idle_timeout    = 600.0   # close idle server connections after 10 min
client_idle_timeout    = 0       # never close idle client connections
query_timeout          = 0       # no query timeout (app + DB handle this)
client_login_timeout   = 10.0

# ── Connection reset (transaction mode) ───────────────────────────────────────
# Ensures no state leaks between different app clients sharing a DB connection
server_reset_query     = DISCARD ALL
server_reset_query_always = 0

# ── Startup parameters to ignore (avoids "unsupported startup param" errors) ──
ignore_startup_parameters = extra_float_digits,search_path

# ── Logging ───────────────────────────────────────────────────────────────────
log_connections    = 0     # too noisy in dev — set to 1 to debug
log_disconnections = 0
log_pooler_errors  = 1
stats_period       = 60

# ── Admin ─────────────────────────────────────────────────────────────────────
# Connect with: psql -h localhost -p 5433 -U pgbouncer pgbouncer
admin_users        = pgbouncer
stats_users        = pgbouncer
