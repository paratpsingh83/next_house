# ══════════════════════════════════════════════════════════════════════════════
# NexHouse — docker-compose.yml
# Full local development stack
#
# Services:
#   nexthouse-api  → Spring Boot app (port 8080)
#   postgres       → PostgreSQL 16 + PostGIS 3 (port 5432)
#   redis          → Redis 7 (port 6379)
#   kafka          → Apache Kafka (port 9092)
#   zookeeper      → Kafka coordinator (port 2181)
#   kafka-ui       → Kafka web UI at http://localhost:8090
#   adminer        → DB web UI at http://localhost:8888
#
# Usage:
#   # Start all services:
#   docker-compose up -d
#
#   # Start only infrastructure (run Spring Boot from IDE):
#   docker-compose up -d postgres redis kafka zookeeper
#
#   # View logs:
#   docker-compose logs -f nexthouse-api
#
#   # Reset everything:
#   docker-compose down -v
#
# Environment variables:
#   Copy .env.example to .env and fill in your values before running.
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

# ── Named volumes (persisted across container restarts) ───────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  nexthouse-network:
    driver: bridge

services:

  # ── PostgreSQL 16 + PostGIS 3 ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nexthouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-nexthouse_db}
      POSTGRES_USER:     ${DB_USERNAME:-nexthouse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexthouse_dev_pass}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script: creates PostGIS extension on first start
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexthouse} -d ${DB_NAME:-nexthouse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nexthouse-network

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: nexthouse-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_pass}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexthouse-network

  # ── Zookeeper (Kafka dependency) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nexthouse-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexthouse-network

  # ── Apache Kafka ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nexthouse-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      # Topic defaults
      KAFKA_NUM_PARTITIONS:                   3
      KAFKA_DEFAULT_REPLICATION_FACTOR:       1
      KAFKA_LOG_RETENTION_HOURS:              168      # 7 days
      KAFKA_LOG_SEGMENT_BYTES:                1073741824
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nexthouse-network

  # ── Kafka UI (development convenience) ────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexthouse-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:            local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"
    networks:
      - nexthouse-network
    profiles:
      - tools    # only starts with: docker-compose --profile tools up

  # ── Adminer — DB web UI (development convenience) ─────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: nexthouse-adminer
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - nexthouse-network
    profiles:
      - tools

  # ── NexHouse Spring Boot API ───────────────────────────────────────────────
  nexthouse-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nexthouse-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: dev

      # Database
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-nexthouse_db}
      DB_USERNAME: ${DB_USERNAME:-nexthouse}
      DB_PASSWORD: ${DB_PASSWORD:-nexthouse_dev_pass}

      # Redis
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_pass}

      # Kafka
      KAFKA_BROKERS: kafka:29092

      # JWT (generate with: openssl rand -base64 64)
      JWT_SECRET: ${JWT_SECRET:-ZGV2LXNlY3JldC1mb3ItbG9jYWwtZGV2ZWxvcG1lbnQtb25seS1ub3QtZm9yLXByb2R1Y3Rpb24=}

      # AWS S3 (use LocalStack for local dev)
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION:            ${AWS_REGION:-ap-southeast-1}
      S3_BUCKET:             ${S3_BUCKET:-nexthouse-media-dev}
      CDN_BASE_URL:          ${CDN_BASE_URL:-http://localhost:4566/nexthouse-media-dev}

      # Firebase (optional for dev — push notifications won't work without it)
      FIREBASE_CREDENTIALS_FILE: ${FIREBASE_CREDENTIALS_FILE:-classpath:firebase-service-account.json}
      FIREBASE_PROJECT_ID:       ${FIREBASE_PROJECT_ID:-nexthouse-dev}

      # Server
      SERVER_PORT: 8080

      # JVM
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom

    ports:
      - "8080:8080"
    volumes:
      # Mount Firebase credentials if available locally
      - ${FIREBASE_CREDENTIALS_PATH:-/dev/null}:/app/secrets/firebase-service-account.json:ro
      # Heap dumps for OOM debugging
      - /tmp/nexthouse-heapdumps:/tmp:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - nexthouse-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
