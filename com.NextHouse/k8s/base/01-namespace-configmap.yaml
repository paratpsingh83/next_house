---
# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-namespace.yaml
# Isolates NexHouse resources from other workloads on the cluster
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Namespace
metadata:
  name: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    environment: production

---
# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-configmap.yaml
# Non-sensitive application configuration — safe to commit
# Secrets (passwords, JWT secret) go in nexthouse-secrets.yaml (never committed)
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexthouse-config
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: config
data:
  # Spring
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"

  # Database connection (host/port/name — credentials in Secret)
  DB_HOST: "postgres-service.nexthouse.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "nexthouse_db"
  DB_USERNAME: "nexthouse"

  # Redis (password in Secret)
  REDIS_HOST: "redis-service.nexthouse.svc.cluster.local"
  REDIS_PORT: "6379"

  # Kafka
  KAFKA_BROKERS: "kafka-service.nexthouse.svc.cluster.local:9092"

  # AWS
  AWS_REGION: "ap-southeast-1"
  S3_BUCKET: "nexthouse-media"
  CDN_BASE_URL: "https://cdn.nexthouse.app"

  # Firebase
  FIREBASE_PROJECT_ID: "nexthouse-prod"
  FIREBASE_CREDENTIALS_FILE: "/app/secrets/firebase-service-account.json"

  # JVM tuning (production)
  JAVA_OPTS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:InitialRAMPercentage=50.0
    -XX:+ExitOnOutOfMemoryError
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:HeapDumpPath=/tmp/heapdump.hprof
    -Djava.security.egd=file:/dev/./urandom
    -Xlog:gc*:file=/tmp/gc.log:time,level,tags:filecount=5,filesize=20m

  # Rate limiting
  APP_RATE_LIMIT_ENABLED: "true"
  APP_RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
  APP_RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE: "10"

  # Cache TTLs (minutes)
  APP_CACHE_USER_PROFILE_TTL_MINUTES: "10"
  APP_CACHE_POST_TTL_MINUTES: "2"
  APP_CACHE_COMMUNITY_TTL_MINUTES: "5"
  APP_CACHE_TRENDING_FEED_TTL_MINUTES: "5"
