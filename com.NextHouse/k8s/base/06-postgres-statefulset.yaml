# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-postgres.yaml
# PostgreSQL 16 + PostGIS 3 StatefulSet
#
# NOTE: For production at scale, use a managed database service instead:
#   - AWS RDS for PostgreSQL (with PostGIS enabled via rds.force_ssl + extensions)
#   - AWS Aurora PostgreSQL (serverless v2 for variable workloads)
#   - Google Cloud SQL for PostgreSQL
#
# This StatefulSet is suitable for staging environments and smaller deployments.
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None     # Headless service for StatefulSet stable DNS
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexthouse-postgres
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres-service
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: nexthouse
      app.kubernetes.io/component: postgres

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexthouse
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 60

      containers:
        - name: postgres
          image: postgis/postgis:16-3.4-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: postgres
              containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: nexthouse_db
            - name: POSTGRES_USER
              value: nexthouse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nexthouse", "-d", "nexthouse_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nexthouse"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true

      volumes:
        - name: postgres-init
          configMap:
            name: postgres-init-scripts

  # ── Persistent storage ──────────────────────────────────────────────────────
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: nexthouse
          app.kubernetes.io/component: postgres
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3             # AWS EBS gp3 — fast SSD
        resources:
          requests:
            storage: 100Gi               # Start with 100 GB, expand as needed

---
# PostgreSQL init ConfigMap (creates PostGIS extension)
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: nexthouse
data:
  01-init.sql: |
    CREATE EXTENSION IF NOT EXISTS postgis;
    CREATE EXTENSION IF NOT EXISTS postgis_topology;
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS pg_trgm;
    CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;
    SELECT PostGIS_Version();
