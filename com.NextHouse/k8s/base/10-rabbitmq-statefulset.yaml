# ══════════════════════════════════════════════════════════════════════════════
# RabbitMQ StatefulSet — STOMP broker relay for WebSocket
#
# Enables Spring's StompBrokerRelay so WebSocket messages published on any
# API pod are delivered to subscribers on all other pods (HPA-safe).
#
# Plugins enabled via RABBITMQ_ENABLED_PLUGINS_FILE:
#   rabbitmq_management — HTTP management API (port 15672)
#   rabbitmq_stomp      — STOMP over TCP (port 61613)
#
# Credentials: read from nexthouse-secrets (RABBITMQ_USER / RABBITMQ_PASS)
# ══════════════════════════════════════════════════════════════════════════════

---
# ── ConfigMap: enabled plugins ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
data:
  enabled_plugins: "[rabbitmq_management,rabbitmq_stomp]."

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
spec:
  serviceName: rabbitmq-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/component: message-broker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rabbitmq
        app.kubernetes.io/component: message-broker
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
            - name: stomp
              containerPort: 61613
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: RABBITMQ_PASS
            - name: RABBITMQ_ENABLED_PLUGINS_FILE
              value: /etc/rabbitmq/enabled_plugins
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
# ── Headless Service (StatefulSet pod identity) ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
  ports:
    - name: amqp
      port: 5672
    - name: stomp
      port: 61613

---
# ── ClusterIP Service (used by Spring app via RABBITMQ_HOST) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/component: message-broker
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: stomp
      port: 61613
      targetPort: 61613