# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-secrets.yaml  ← TEMPLATE ONLY — NEVER COMMIT WITH REAL VALUES
#
# In production, use one of these approaches instead of committing secrets:
#
# Option A — External Secrets Operator + AWS Secrets Manager:
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   spec:
#     secretStoreRef:
#       name: aws-secrets-manager
#     target:
#       name: nexthouse-secrets
#     data:
#       - secretKey: DB_PASSWORD
#         remoteRef:
#           key: nexthouse/prod/db
#           property: password
#
# Option B — Sealed Secrets (kubeseal):
#   kubeseal --format yaml < nexthouse-secrets.yaml > nexthouse-sealed-secrets.yaml
#   # Only the sealed version is committed to git
#
# Option C — HashiCorp Vault Agent Injector:
#   Uses annotations to inject secrets as files/env at pod startup
#
# Values below are BASE64-encoded. Encode with:
#   echo -n "your_value" | base64
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: nexthouse-secrets
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Database password
  # echo -n "your_db_password" | base64
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD

  # Redis password
  REDIS_PASSWORD: REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD

  # JWT secret (min 256-bit → 32 bytes → 44 base64 chars)
  # Generate: openssl rand -base64 64 | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET

  # AWS credentials
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BASE64_ENCODED_AWS_KEY_ID
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BASE64_ENCODED_AWS_SECRET

---
# ── Firebase credentials as a separate secret (JSON file content) ─────────────
apiVersion: v1
kind: Secret
metadata:
  name: nexthouse-firebase-secret
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: firebase
type: Opaque
data:
  # Base64-encoded Firebase service account JSON:
  # cat firebase-service-account.json | base64 -w 0
  firebase-service-account.json: REPLACE_WITH_BASE64_ENCODED_FIREBASE_JSON
