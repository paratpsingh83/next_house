# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-api-deployment.yaml
#
# Production-grade Deployment with:
#   - Rolling update strategy (zero-downtime)
#   - Resource requests + limits (CPU, memory)
#   - Liveness + Readiness + Startup probes
#   - Security context (non-root, read-only filesystem)
#   - Pod anti-affinity (spread pods across nodes)
#   - Topology spread constraints
#   - Pod Disruption Budget reference
# ══════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexthouse-api
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  # Initial replica count — HPA will scale this between min and max
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: nexthouse
      app.kubernetes.io/component: api

  # ── Rolling update strategy ─────────────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during update
      maxUnavailable: 0    # Never take pods offline during update (zero-downtime)

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexthouse
        app.kubernetes.io/component: api
        app.kubernetes.io/version: "1.0.0"
      annotations:
        # Force pod restart when ConfigMap or Secret changes
        checksum/config: "{{ .Values.configChecksum }}"
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"

    spec:
      # ── Service account ──────────────────────────────────────────────────────
      serviceAccountName: nexthouse-api-sa

      # ── Graceful termination ─────────────────────────────────────────────────
      # Allow 60s for in-flight requests to complete before SIGKILL
      terminationGracePeriodSeconds: 60

      # ── Pod anti-affinity — spread pods across different nodes ───────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nexthouse
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname

      # ── Topology spread — spread across availability zones ───────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: nexthouse
              app.kubernetes.io/component: api

      # ── Init container — wait for dependencies ───────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
              echo "PostgreSQL is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for Redis..."; sleep 2;
              done
              echo "Redis is ready"

      containers:
        - name: nexthouse-api
          image: nexthouse-backend:latest  # Replace with your registry path
          # e.g. 123456789.dkr.ecr.ap-southeast-1.amazonaws.com/nexthouse-backend:1.0.0
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── Environment from ConfigMap ───────────────────────────────────────
          envFrom:
            - configMapRef:
                name: nexthouse-config

          # ── Environment from Secrets ─────────────────────────────────────────
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: JWT_SECRET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: AWS_SECRET_ACCESS_KEY

          # ── Resource limits ──────────────────────────────────────────────────
          # requests: guaranteed allocation (used for scheduling decisions)
          # limits:   hard cap (OOMKill if exceeded)
          # Rule of thumb: limits = 2x requests for burstable workloads
          resources:
            requests:
              cpu:    "500m"      # 0.5 vCPU guaranteed
              memory: "512Mi"     # 512 MB guaranteed
            limits:
              cpu:    "2000m"     # 2 vCPU burst max
              memory: "1024Mi"    # 1 GB hard limit — OOMKill above this

          # ── Startup probe ────────────────────────────────────────────────────
          # Gives the app up to 3m to start (90 * 2s = 180s)
          # Disables liveness/readiness checks during this window
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 18    # 30 + 18*10 = 210s max startup time
            successThreshold: 1

          # ── Readiness probe ──────────────────────────────────────────────────
          # Pod removed from Service load balancer when this fails
          # Checks DB + Redis connectivity (Spring Boot HealthIndicators)
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # ── Liveness probe ───────────────────────────────────────────────────
          # Pod restarted when this fails (dead threads, deadlocks)
          # Uses a lighter check than readiness (no DB ping)
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # ── Lifecycle hooks ──────────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                # Sleep 15s before SIGTERM to allow K8s to remove from load balancer
                # Prevents new requests hitting a shutting-down pod
                command: ["/bin/sh", "-c", "sleep 15"]

          # ── Security context ─────────────────────────────────────────────────
          securityContext:
            runAsNonRoot:           true
            runAsUser:              65532    # distroless nonroot UID
            runAsGroup:             65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          # ── Volume mounts ────────────────────────────────────────────────────
          volumeMounts:
            # Writable /tmp for heap dumps and GC logs
            - name: tmp-dir
              mountPath: /tmp
            # Firebase credentials (mounted from Secret)
            - name: firebase-credentials
              mountPath: /app/secrets
              readOnly: true

      # ── Volumes ──────────────────────────────────────────────────────────────
      volumes:
        - name: tmp-dir
          emptyDir: {}
        - name: firebase-credentials
          secret:
            secretName: nexthouse-firebase-secret

      # ── Image pull secrets (for private registry) ─────────────────────────────
      # imagePullSecrets:
      #   - name: nexthouse-registry-secret

      # ── Pod security context ─────────────────────────────────────────────────
      securityContext:
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
