# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-redis.yaml
# Redis 7 StatefulSet with persistence and password auth
#
# NOTE: For production, prefer a managed Redis service:
#   - AWS ElastiCache for Redis (Cluster Mode for horizontal scaling)
#   - Google Memorystore
#
# This StatefulSet is suitable for staging and smaller deployments.
# ══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: redis
spec:
  clusterIP: None     # Headless
  selector:
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: nexthouse
data:
  redis.conf: |
    # Authentication (password injected via env variable)
    requirepass ${REDIS_PASSWORD}

    # Memory policy — evict least-recently-used keys when at maxmemory
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # Persistence — RDB snapshots + AOF for durability
    save 60 1000
    save 300 100
    save 900 1
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # Performance
    tcp-keepalive 300
    timeout 0
    hz 10

    # Logging
    loglevel notice

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexthouse-redis
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: redis
spec:
  serviceName: redis-service
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: nexthouse
      app.kubernetes.io/component: redis

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexthouse
        app.kubernetes.io/component: redis
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent

          command:
            - redis-server
            - /etc/redis/redis.conf

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexthouse-secrets
                  key: REDIS_PASSWORD

          ports:
            - name: redis
              containerPort: 6379

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep PONG
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping | grep PONG
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis

      volumes:
        - name: redis-config
          configMap:
            name: redis-config

  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app.kubernetes.io/name: nexthouse
          app.kubernetes.io/component: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
