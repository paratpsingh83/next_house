# ══════════════════════════════════════════════════════════════════════════════
# nexthouse-kafka.yaml
# Apache Kafka StatefulSet (single-broker dev/staging)
#
# NOTE: For production, use a managed Kafka service:
#   - AWS MSK (Managed Streaming for Apache Kafka)
#   - Confluent Cloud
#   - Strimzi Kafka Operator (for self-managed K8s deployments)
#
# This manifest uses Confluent's Kafka image with KRaft mode (no Zookeeper)
# for simplicity in staging environments.
# ══════════════════════════════════════════════════════════════════════════════

---
# ── Kafka headless service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: kafka-internal
      port: 29092
      targetPort: 29092

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexthouse-kafka
  namespace: nexthouse
  labels:
    app.kubernetes.io/name: nexthouse
    app.kubernetes.io/component: kafka
spec:
  serviceName: kafka-service
  replicas: 1         # Increase to 3 for production replication

  selector:
    matchLabels:
      app.kubernetes.io/name: nexthouse
      app.kubernetes.io/component: kafka

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexthouse
        app.kubernetes.io/component: kafka
    spec:
      terminationGracePeriodSeconds: 30

      # Init container generates a unique Kafka cluster ID on first boot
      initContainers:
        - name: kafka-init
          image: confluentinc/cp-kafka:7.6.1
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/lib/kafka/data/kraft-cluster-id ]; then
                CLUSTER_ID=$(kafka-storage random-uuid)
                echo $CLUSTER_ID > /var/lib/kafka/data/kraft-cluster-id
                kafka-storage format --config /etc/kafka/kraft/server.properties \
                  --cluster-id $CLUSTER_ID --ignore-formatted
              fi
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-config
              mountPath: /etc/kafka/kraft

      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.1
          imagePullPolicy: IfNotPresent

          ports:
            - name: kafka
              containerPort: 9092
            - name: kafka-internal
              containerPort: 29092
            - name: kafka-controller
              containerPort: 9093

          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:29092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service:9092,PLAINTEXT_INTERNAL://kafka-service:29092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-service:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT_INTERNAL"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"

          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:9092
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-broker-api-versions --bootstrap-server localhost:9092
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
            - name: kafka-config
              mountPath: /etc/kafka/kraft

      volumes:
        - name: kafka-config
          configMap:
            name: kafka-kraft-config

  volumeClaimTemplates:
    - metadata:
        name: kafka-data
        labels:
          app.kubernetes.io/name: nexthouse
          app.kubernetes.io/component: kafka
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 50Gi

---
# Kafka KRaft configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-kraft-config
  namespace: nexthouse
data:
  server.properties: |
    # KRaft mode - no Zookeeper required
    process.roles=broker,controller
    node.id=1
    controller.quorum.voters=1@kafka-service:9093

    # Listeners
    listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:29092
    advertised.listeners=PLAINTEXT://kafka-service:9092,PLAINTEXT_INTERNAL://kafka-service:29092
    listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
    inter.broker.listener.name=PLAINTEXT_INTERNAL
    controller.listener.names=CONTROLLER

    # Storage
    log.dirs=/var/lib/kafka/data

    # Topics
    num.partitions=3
    default.replication.factor=1
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    auto.create.topics.enable=true

    # Retention
    log.retention.hours=168
    log.segment.bytes=1073741824
    log.retention.check.interval.ms=300000

    # Performance
    num.network.threads=3
    num.io.threads=8
    socket.send.buffer.bytes=102400
    socket.receive.buffer.bytes=102400
    socket.request.max.bytes=104857600
