# ══════════════════════════════════════════════════════════════════════════════
# NexHouse — application.yml
# ══════════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: nexthouse-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nexthouse_db}
    username: ${DB_USERNAME:nexthouse}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: NexHouseHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 30
          order_inserts: true
          order_updates: true
        cache:
          use_second_level_cache: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 1000ms

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: nexthouse-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.NextHouse.event"

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  mail:
    host: ${SES_HOST:email-smtp.us-east-1.amazonaws.com}
    port: 587
    username: ${SES_USERNAME:}
    password: ${SES_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
    min-response-size: 1024
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

app:
  jwt:
    secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LW9ubHktbm90LWZvci1wcm9kdWN0aW9u}
    access-token-expiry-seconds: 900
    refresh-token-expiry-days: 30
  rate-limit:
    enabled: true
    requests-per-minute: 120
    auth-requests-per-minute: 10
    window-seconds: 60
  cors:
    allowed-origins:
      - https://nexthouse.app
      - http://localhost:3000
  media:
    cdn-base-url: ${CDN_BASE_URL:https://cdn.nexthouse.app}
    bucket: ${S3_BUCKET:nexthouse-media}
  cache:
    user-profile-ttl-minutes: 10
    post-ttl-minutes: 2
    community-ttl-minutes: 5
    trending-feed-ttl-minutes: 5

aws:
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket: ${S3_BUCKET:nexthouse-media}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

firebase:
  credentials-file: ${FIREBASE_CREDENTIALS_FILE:classpath:firebase-service-account.json}
  project-id: ${FIREBASE_PROJECT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.NextHouse: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/nexthouse.log

---
# ══════════════════════════════════════════════════════════════════════════════
# Dev profile  →  run with:  --spring.profiles.active=dev
# ══════════════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/nexthouse_db
    username: nexthouse
    password: changeme

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.NextHouse: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

management:
  health:
    mail:
      enabled: false

app:
  jwt:
    secret: ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LW9ubHktbm90LWZvci1wcm9kdWN0aW9u
  rate-limit:
    enabled: false
  media:
    cdn-base-url: http://localhost:8080
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001

# ADDED: Firebase disabled for local dev — no push notifications sent
# FirebaseConfig reads "disabled" and skips loading credentials
# The app starts and runs normally, push notifications are silently skipped
firebase:
  credentials-file: disabled
  project-id: nexthouse-dev

---
# ══════════════════════════════════════════════════════════════════════════════
# Test profile  →  activated by @ActiveProfiles("test") in test classes
# ══════════════════════════════════════════════════════════════════════════════
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://localhost:5432/nexthouse_test
    username: nexthouse
    password: changeme

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  kafka:
    listener:
      auto-startup: false

app:
  jwt:
    secret: ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LW9ubHktbm90LWZvci1wcm9kdWN0aW9u
    access-token-expiry-seconds: 3600
  rate-limit:
    enabled: false
  media:
    cdn-base-url: http://localhost:8080

# ADDED: Firebase disabled for tests too
firebase:
  credentials-file: disabled
  project-id: nexthouse-test

logging:
  level:
    root: WARN
    com.NextHouse: INFO
